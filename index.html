<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>どうぶつ すきなものクイズ</title>
<style>
  :root{
    --bg1:#fff7d6;
    --bg2:#dff7ff;
    --main:#ff8fb3;
    --accent:#ffd166;
    --text:#4b3b2f;
    --ok:#ff5c8a;
    --ng:#6aa9ff;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    min-height:100vh;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
    background:linear-gradient(160deg,var(--bg1),var(--bg2));
    color:var(--text);
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
  }
  .app{
    width:min(100vw,520px);
    min-height:100vh;
    padding:calc(env(safe-area-inset-top) + 14px) 18px calc(env(safe-area-inset-bottom) + 18px);
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .title{
    text-align:center;
    font-weight:900;
    font-size:clamp(24px,7vw,38px);
    letter-spacing:.03em;
    line-height:1.2;
    text-shadow:0 3px 0 rgba(255,255,255,.8);
  }
  .stage{
    flex:1;
    background:rgba(255,255,255,.7);
    border:4px solid rgba(255,255,255,.95);
    border-radius:34px;
    box-shadow:0 16px 35px rgba(0,0,0,.12);
    padding:18px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:space-between;
    position:relative;
    overflow:hidden;
  }
  .question{
    text-align:center;
    font-size:clamp(22px,7vw,34px);
    font-weight:900;
    min-height:52px;
  }
  .character{
    font-size:clamp(88px,30vw,150px);
    filter:drop-shadow(0 8px 0 rgba(0,0,0,.08));
    transition:transform .25s ease;
    line-height:1;
  }
  .character.happy{ animation:jump .55s ease; }
  @keyframes jump{
    0%,100%{transform:translateY(0) scale(1)}
    35%{transform:translateY(-28px) scale(1.12) rotate(-4deg)}
    70%{transform:translateY(0) scale(1.05) rotate(4deg)}
  }
  .choices{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    width:100%;
  }
  button.choice{
    border:0;
    border-radius:28px;
    background:white;
    padding:16px 8px;
    min-height:150px;
    font-size:clamp(58px,20vw,100px);
    box-shadow:0 8px 0 #f0d6a2,0 14px 24px rgba(0,0,0,.12);
    transform:translateY(0);
    transition:transform .08s ease, box-shadow .08s ease;
  }
  button.choice:active{
    transform:translateY(7px);
    box-shadow:0 1px 0 #f0d6a2,0 8px 18px rgba(0,0,0,.1);
  }
  .message{
    text-align:center;
    font-size:clamp(26px,9vw,42px);
    font-weight:1000;
    min-height:55px;
  }
  .message.ok{color:var(--ok)}
  .message.ng{color:var(--ng)}
  .start{
    position:absolute;
    inset:0;
    background:linear-gradient(160deg,#fff3b0,#ffd6e7);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:20px;
    z-index:5;
    padding:24px;
    text-align:center;
  }
  .start h1{
    margin:0;
    font-size:clamp(30px,10vw,48px);
    line-height:1.25;
  }
  .start button{
    border:0;
    background:var(--main);
    color:white;
    font-weight:900;
    font-size:28px;
    padding:18px 36px;
    border-radius:999px;
    box-shadow:0 8px 0 #d85f83;
  }
  .sparkle{
    position:absolute;
    pointer-events:none;
    font-size:34px;
    animation:pop 800ms ease forwards;
  }
  @keyframes pop{
    0%{opacity:0; transform:scale(.2) translateY(20px)}
    35%{opacity:1}
    100%{opacity:0; transform:scale(1.6) translateY(-70px)}
  }
</style>
</head>
<body>
<div class="app">
  <div class="title">すきなものクイズ</div>
  <div class="stage">
    <div class="start" id="start">
      <h1>ぼくのすきなもの<br>どっちかなっ？</h1>
      <button id="startBtn">スタート</button>
    </div>
    <div class="question" id="question">どっちかなっ？</div>
    <div class="character" id="character">🐰</div>
    <div class="message" id="message"></div>
    <div class="choices">
      <button class="choice" id="left"></button>
      <button class="choice" id="right"></button>
    </div>
  </div>
</div>

<script>
const problems = [
  {animal:"🐰", like:"🥕", wrong:"🍖"},
  {animal:"🐱", like:"🐟", wrong:"🥕"},
  {animal:"🐶", like:"🦴", wrong:"🌿"},
  {animal:"🐼", like:"🎋", wrong:"🍖"},
  {animal:"🐵", like:"🍌", wrong:"🐟"},
  {animal:"🐘", like:"🍎", wrong:"🦴"},
  {animal:"🦁", like:"🍖", wrong:"🥕"},
  {animal:"🦊", like:"🍇", wrong:"🎋"},
  {animal:"🐻", like:"🍯", wrong:"🌿"},
  {animal:"🐭", like:"🧀", wrong:"🍖"},
  {animal:"🐸", like:"🪰", wrong:"🍌"},
  {animal:"🐝", like:"🌸", wrong:"🧀"},
  {animal:"🦋", like:"🌼", wrong:"🦴"},
  {animal:"🐞", like:"🍃", wrong:"🐟"},
  {animal:"🦗", like:"🌿", wrong:"🍯"},
  {animal:"🦖", like:"🍖", wrong:"🌸"},
  {animal:"🐴", like:"🥕", wrong:"🐟"},
  {animal:"🐔", like:"🌽", wrong:"🦴"},
  {animal:"🐧", like:"🐟", wrong:"🍌"},
  {animal:"🐿️", like:"🌰", wrong:"🍖"}
];

let current = null;
let locked = false;
let voiceReady = false;

const start = document.getElementById("start");
const startBtn = document.getElementById("startBtn");
const question = document.getElementById("question");
const character = document.getElementById("character");
const message = document.getElementById("message");
const left = document.getElementById("left");
const right = document.getElementById("right");

function speak(text){
  try{
    if(!("speechSynthesis" in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "ja-JP";
    u.rate = 1.18;
    u.pitch = 1.82;
    u.volume = 1;
    window.speechSynthesis.speak(u);
  }catch(e){}
}

function shuffle(a){
  return a.sort(()=>Math.random()-0.5);
}

function nextProblem(){
  locked = false;
  message.textContent = "";
  message.className = "message";
  character.classList.remove("happy");
  current = problems[Math.floor(Math.random()*problems.length)];
  character.textContent = current.animal;
  const opts = shuffle([current.like, current.wrong]);
  left.textContent = opts[0];
  right.textContent = opts[1];
  question.textContent = "どっちかなっ？";
  setTimeout(()=>speak("どっちかなっ？"), 180);
}

function sparkle(){
  for(let i=0;i<10;i++){
    const s = document.createElement("div");
    s.className = "sparkle";
    s.textContent = ["✨","⭐","💖","🎉"][Math.floor(Math.random()*4)];
    s.style.left = (20 + Math.random()*60) + "%";
    s.style.top = (24 + Math.random()*35) + "%";
    document.querySelector(".stage").appendChild(s);
    setTimeout(()=>s.remove(), 850);
  }
}

function answer(choice){
  if(locked) return;
  if(choice === current.like){
    locked = true;
    message.textContent = "あたりっ！";
    message.className = "message ok";
    character.classList.add("happy");
    sparkle();
    speak("あたりっ！");
    setTimeout(nextProblem, 1100);
  }else{
    message.textContent = "ちがうよー";
    message.className = "message ng";
    speak("ちがうよー");
  }
}

startBtn.addEventListener("click", ()=>{
  voiceReady = true;
  start.style.display = "none";
  nextProblem();
});
left.addEventListener("click", ()=>answer(left.textContent));
right.addEventListener("click", ()=>answer(right.textContent));
</script>
</body>
</html>
