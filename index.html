<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>どうぶつ すきなものクイズ</title>
<style>
  :root{
    --cream:#fff5c9;
    --sky:#dbfbff;
    --ink:#4b382d;
    --card:#fffef8;
    --shadow:#f0d28b;
    --pink:#ff8fb3;
    --blue:#63a8ff;
  }
  *{box-sizing:border-box}
  html,body{margin:0; min-height:100%; overflow:hidden;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
    background:
      radial-gradient(circle at 18% 12%, #fff9df 0 18%, transparent 34%),
      radial-gradient(circle at 84% 88%, #cdf8ff 0 20%, transparent 36%),
      linear-gradient(160deg,var(--cream),var(--sky));
    color:var(--ink);
  }
  .app{
    height:100dvh;
    width:min(100vw,520px);
    margin:0 auto;
    padding:calc(env(safe-area-inset-top) + 8px) 12px calc(env(safe-area-inset-bottom) + 10px);
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .title{
    text-align:center;
    font-weight:1000;
    font-size:clamp(30px,9vw,46px);
    line-height:1.05;
    letter-spacing:.03em;
    text-shadow:0 4px 0 rgba(255,255,255,.8);
    padding-top:2px;
  }
  .stage{
    flex:1;
    min-height:0;
    background:rgba(255,254,248,.82);
    border:5px solid rgba(255,255,255,.96);
    border-radius:34px;
    box-shadow:0 14px 28px rgba(0,0,0,.10);
    padding:10px 12px 12px;
    display:grid;
    grid-template-rows:auto 1fr auto auto;
    gap:8px;
    position:relative;
    overflow:hidden;
  }
  .question{
    text-align:center;
    font-size:clamp(31px,9vw,46px);
    font-weight:1000;
    line-height:1.05;
    padding-top:4px;
  }
  .animalWrap{
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:0;
    position:relative;
  }
  .character{
    font-size:clamp(145px,42vw,220px);
    line-height:1;
    filter:drop-shadow(0 9px 0 rgba(0,0,0,.08));
    transition:transform .25s ease;
    transform-origin:center bottom;
  }
  .character.happy{ animation:jump .55s ease; }
  @keyframes jump{
    0%,100%{transform:translateY(0) scale(1)}
    35%{transform:translateY(-28px) scale(1.12) rotate(-4deg)}
    70%{transform:translateY(0) scale(1.05) rotate(4deg)}
  }
  .message{
    text-align:center;
    font-size:clamp(32px,10vw,48px);
    font-weight:1000;
    line-height:1.05;
    min-height:50px;
  }
  .message.ok{color:#ff4f86}
  .message.ng{color:var(--blue)}
  .choices{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    width:100%;
  }
  button.choice{
    border:0;
    border-radius:30px;
    background:white;
    min-height:clamp(146px,22vh,190px);
    padding:8px;
    font-size:clamp(76px,23vw,122px);
    box-shadow:0 9px 0 var(--shadow),0 13px 22px rgba(0,0,0,.10);
    transform:translateY(0);
    transition:transform .08s ease, box-shadow .08s ease;
  }
  button.choice:active{
    transform:translateY(7px);
    box-shadow:0 2px 0 var(--shadow),0 8px 15px rgba(0,0,0,.08);
  }
  .start{
    position:absolute;
    inset:0;
    background:linear-gradient(160deg,#fff4ba,#ffd7e7);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:18px;
    z-index:5;
    padding:24px;
    text-align:center;
  }
  .start h1{
    margin:0;
    font-size:clamp(32px,10vw,50px);
    line-height:1.22;
    font-weight:1000;
  }
  .start button{
    border:0;
    background:var(--pink);
    color:white;
    font-weight:1000;
    font-size:30px;
    padding:18px 40px;
    border-radius:999px;
    box-shadow:0 8px 0 #d85f83;
  }
  .sparkle{
    position:absolute;
    pointer-events:none;
    font-size:38px;
    animation:pop 800ms ease forwards;
    z-index:4;
  }
  @keyframes pop{
    0%{opacity:0; transform:scale(.2) translateY(20px)}
    35%{opacity:1}
    100%{opacity:0; transform:scale(1.6) translateY(-70px)}
  }
</style>
</head>
<body>
<div class="app">
  <div class="title">すきなものクイズ</div>
  <div class="stage">
    <div class="start" id="start">
      <h1>ぼくのすきなもの<br>どっちかなっ？</h1>
      <button id="startBtn">スタート</button>
    </div>
    <div class="question" id="question">どっちかなっ？</div>
    <div class="animalWrap"><div class="character" id="character">🐰</div></div>
    <div class="message" id="message"></div>
    <div class="choices">
      <button class="choice" id="left"></button>
      <button class="choice" id="right"></button>
    </div>
  </div>
</div>

<script>
const problems = [
  {animal:"🐰", like:"🥕", wrong:"🍖"},
  {animal:"🐱", like:"🐟", wrong:"🥕"},
  {animal:"🐶", like:"🦴", wrong:"🌿"},
  {animal:"🐼", like:"🎋", wrong:"🍖"},
  {animal:"🐵", like:"🍌", wrong:"🐟"},
  {animal:"🐘", like:"🍎", wrong:"🦴"},
  {animal:"🦁", like:"🍖", wrong:"🥕"},
  {animal:"🦊", like:"🍇", wrong:"🎋"},
  {animal:"🐻", like:"🍯", wrong:"🌿"},
  {animal:"🐭", like:"🧀", wrong:"🍖"},
  {animal:"🐸", like:"🪰", wrong:"🍌"},
  {animal:"🐝", like:"🌸", wrong:"🧀"},
  {animal:"🦋", like:"🌼", wrong:"🦴"},
  {animal:"🐞", like:"🍃", wrong:"🐟"},
  {animal:"🦗", like:"🌿", wrong:"🍯"},
  {animal:"🦖", like:"🍖", wrong:"🌸"},
  {animal:"🐴", like:"🥕", wrong:"🐟"},
  {animal:"🐔", like:"🌽", wrong:"🦴"},
  {animal:"🐧", like:"🐟", wrong:"🍌"},
  {animal:"🐿️", like:"🌰", wrong:"🍖"}
];

let current = null;
let locked = false;

const start = document.getElementById("start");
const startBtn = document.getElementById("startBtn");
const question = document.getElementById("question");
const character = document.getElementById("character");
const message = document.getElementById("message");
const left = document.getElementById("left");
const right = document.getElementById("right");

function speak(text){
  try{
    if(!("speechSynthesis" in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "ja-JP";
    u.rate = 1.18;
    u.pitch = 1.86;
    u.volume = 1;
    window.speechSynthesis.speak(u);
  }catch(e){}
}

function shuffle(a){
  return a.sort(()=>Math.random()-0.5);
}

function nextProblem(){
  locked = false;
  message.textContent = "";
  message.className = "message";
  character.classList.remove("happy");
  current = problems[Math.floor(Math.random()*problems.length)];
  character.textContent = current.animal;
  const opts = shuffle([current.like, current.wrong]);
  left.textContent = opts[0];
  right.textContent = opts[1];
  question.textContent = "どっちかなっ？";
  setTimeout(()=>speak("どっちかなっ？"), 160);
}

function sparkle(){
  for(let i=0;i<12;i++){
    const s = document.createElement("div");
    s.className = "sparkle";
    s.textContent = ["✨","⭐","💖","🎉"][Math.floor(Math.random()*4)];
    s.style.left = (18 + Math.random()*64) + "%";
    s.style.top = (18 + Math.random()*42) + "%";
    document.querySelector(".stage").appendChild(s);
    setTimeout(()=>s.remove(), 850);
  }
}

function answer(choice){
  if(locked) return;
  if(choice === current.like){
    locked = true;
    message.textContent = "あたりっ！";
    message.className = "message ok";
    character.classList.add("happy");
    sparkle();
    speak("あたりっ！");
    setTimeout(nextProblem, 1050);
  }else{
    message.textContent = "ちがうよー";
    message.className = "message ng";
    speak("ちがうよー");
  }
}

startBtn.addEventListener("click", ()=>{
  start.style.display = "none";
  nextProblem();
});
left.addEventListener("click", ()=>answer(left.textContent));
right.addEventListener("click", ()=>answer(right.textContent));
</script>
</body>
</html>
